
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.search-bar { position: relative; margin-bottom: 1rem; }
.search-bar input { width: 100%; padding: 10px 12px 10px 36px; font-size: 15px; border-radius: var(--border-radius-md); }
.search-bar i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--color-text-secondary); font-size: 17px; pointer-events: none; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
.pill { padding: 5px 12px; border-radius: 999px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
.pill.active { color: #3C3489; background: #EEEDFE; border-color: #AFA9EC; }
.pill:hover:not(.active) { background: var(--color-background-secondary); }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-tertiary); margin: 1.5rem 0 0.5rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.section-label:first-of-type { margin-top: 0; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.card:hover { border-color: var(--color-border-secondary); }
.card.open { border-color: #AFA9EC; }
.card-head { display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.term { font-size: 15px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.chevron { color: var(--color-text-tertiary); font-size: 15px; transition: transform 0.2s; }
.card.open .chevron { transform: rotate(180deg); }
.def { font-size: 14px; color: var(--color-text-secondary); line-height: 1.65; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); display: none; }
.card.open .def { display: block; }
.analogy { font-size: 13px; color: var(--color-text-tertiary); margin-top: 8px; font-style: italic; }
.empty { text-align: center; padding: 2rem; color: var(--color-text-tertiary); font-size: 14px; }
.count { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
</style>

<div class="wrap">
<h2 class="sr-only">AI Glossary — searchable reference guide for AI terms</h2>
<div class="search-bar">
  <i class="ti ti-search" aria-hidden="true"></i>
  <input type="text" id="search" placeholder="Search any term..." aria-label="Search terms">
</div>
<div class="filters" id="filters"></div>
<div class="count" id="count"></div>
<div id="list"></div>
</div>

<script>
const CATS = {
  "Data & Tokens": { color: "#1D9E75", bg: "#E1F5EE", dot: "#1D9E75", tag_color: "#085041" },
  "Architecture": { color: "#534AB7", bg: "#EEEDFE", dot: "#534AB7", tag_color: "#26215C" },
  "Training Loop": { color: "#D85A30", bg: "#FAECE7", dot: "#D85A30", tag_color: "#4A1B0C" },
  "Training Phases": { color: "#D4537E", bg: "#FBEAF0", dot: "#D4537E", tag_color: "#4B1528" },
  "Inference": { color: "#378ADD", bg: "#E6F1FB", dot: "#378ADD", tag_color: "#042C53" },
  "Hardware & Efficiency": { color: "#BA7517", bg: "#FAEEDA", dot: "#BA7517", tag_color: "#412402" },
  "Scale & Research": { color: "#639922", bg: "#EAF3DE", dot: "#639922", tag_color: "#173404" },
  "Advanced Architectures": { color: "#888780", bg: "#F1EFE8", dot: "#888780", tag_color: "#2C2C2A" },
};

const TERMS = [
  { term: "Data", cat: "Data & Tokens", def: "The raw text, images, code, or other information the model is trained on. More data generally means a smarter model, but quality matters more than raw quantity.", analogy: "Like the books a student reads before an exam — the more varied and well-written, the better." },
  { term: "Tokens", cat: "Data & Tokens", def: "The basic units AI reads and writes. Not quite words — more like syllable-sized chunks. 'Unbelievable' might be 3 tokens. Every input gets broken into tokens before the model sees it, and every output is generated token by token.", analogy: "Like how sheet music breaks sound into individual notes." },
  { term: "Tokenizer", cat: "Data & Tokens", def: "The tool that splits raw text into tokens before it reaches the model. Different models use different tokenizers, which is why the same text has different token counts across models.", analogy: "Like a deli slicer — same loaf of bread, different slice thickness." },
  { term: "Embeddings", cat: "Data & Tokens", def: "Each token gets converted into a long list of numbers that represents its meaning mathematically. Words with similar meanings end up with similar numbers. This is how language becomes something a computer can compute on.", analogy: "Giving every word a GPS coordinate — similar words are near each other on the map." },
  { term: "Vector", cat: "Data & Tokens", def: "Just a list of numbers. An embedding is a vector. Almost everything in AI is represented as vectors at some point because computers are incredibly fast at math on lists of numbers.", analogy: "A recipe: [2 cups flour, 1 cup sugar, 3 eggs] is a vector — a position in ingredient-space." },
  { term: "Corpus", cat: "Data & Tokens", def: "The full collection of text a model is trained on. For large models this is essentially a compressed version of the internet plus books, code repositories, and more.", analogy: "The entire school library, used to educate one student." },
  { term: "Context window", cat: "Data & Tokens", def: "The maximum amount of text a model can 'see' at once during a conversation. Anything outside this window is invisible to the model. A 100k context window can hold roughly 75,000 words.", analogy: "The model's working desk — only what fits on the desk can be worked on." },

  { term: "Transformer", cat: "Architecture", def: "The specific model design that powers virtually all modern AI — GPT, Claude, Llama, Gemini. Introduced in a 2017 Google paper called 'Attention is All You Need.' It's a particular way of stacking layers that processes all tokens simultaneously rather than one at a time.", analogy: "Like a factory floor where all workers handle their piece at the same time, rather than passing it down a single line." },
  { term: "Attention mechanism", cat: "Architecture", def: "The core innovation of transformers. Lets every token look at every other token and decide what's relevant to its own meaning. When the model reads 'the cat sat on the mat because it was tired,' attention figures out that 'it' refers to 'the cat' not 'the mat.'", analogy: "Like a group conversation where everyone is listening to everyone else at the same time, not just the person next to them." },
  { term: "Self-attention", cat: "Architecture", def: "When a token attends to all other tokens in the same input, including itself, to build a rich understanding of its context. It's self-referential — the sequence is attending to itself.", analogy: "A student re-reading their own notes and connecting the dots between different sections." },
  { term: "Multi-head attention", cat: "Architecture", def: "Instead of running attention once, the model runs it many times in parallel — each 'head' learns to look for different kinds of relationships (grammar, subject-verb, topic, etc.). Their outputs are combined.", analogy: "Like having a team of readers, each tasked with highlighting a different thing — one finds names, one finds verbs, one finds tone." },
  { term: "Layers", cat: "Architecture", def: "The model is built as a stack of repeated blocks. Each layer refines the representation a little more. Early layers catch syntax and basic patterns; deeper layers handle meaning and reasoning.", analogy: "Like floors of a building — each floor adds something to the structure above the one below it." },
  { term: "Weights / Parameters", cat: "Architecture", def: "The numbers inside the model that encode everything it learned. They're set during training and stay fixed during normal use. A 70B model has 70 billion of these numbers.", analogy: "A musician's muscle memory — built up over millions of hours of practice, encoded in their fingers." },
  { term: "Feed-forward network (FFN)", cat: "Architecture", def: "A simpler layer type inside each transformer block. After attention figures out relationships between tokens, the FFN processes each token independently to apply learned transformations. Often where factual knowledge is thought to be stored.", analogy: "The attention layer figures out who's in the room; the FFN decides what to say to each of them." },
  { term: "Residual connections", cat: "Architecture", def: "Shortcut paths that let the original input 'skip' a layer and be added back in after. This prevents the model from forgetting what it knew before the layer and makes very deep networks trainable.", analogy: "Taking notes before a lecture and merging them with your post-lecture notes — preserving both." },
  { term: "Layer normalization", cat: "Architecture", def: "A technique that rescales the numbers inside the network at each layer to keep them in a healthy range. Without it, values can explode or vanish as they pass through many layers.", analogy: "Volume normalization in audio — keeps everything audible, prevents clipping." },
  { term: "Softmax", cat: "Architecture", def: "A function that converts a list of raw scores into probabilities that sum to 1.0. Used at the output layer to turn the model's raw predictions into a probability distribution over every possible next token.", analogy: "Polling: converting 'I prefer A a lot, B a little' into '73% A, 27% B'." },
  { term: "Logits", cat: "Architecture", def: "The raw unnormalized scores the model produces before softmax is applied. They're just numbers — could be anything. Softmax turns them into clean probabilities.", analogy: "Raw vote tallies before they're converted into percentages." },

  { term: "Loss function", cat: "Training Loop", def: "A score that measures how wrong the model's prediction was. If the model predicted 'dog' and the answer was 'cat,' the loss is high. Training is the process of making this number as small as possible.", analogy: "The gap between your dart throw and the bullseye. Training means learning to close that gap." },
  { term: "Cross-entropy loss", cat: "Training Loop", def: "The specific loss function used in language models. It measures how surprised the model was by the correct answer. If the model assigned high probability to the right token, loss is low. If it was confident about the wrong answer, loss is very high.", analogy: "Punishing overconfident wrong answers more than uncertain wrong answers." },
  { term: "Gradient", cat: "Training Loop", def: "A direction and magnitude describing how changing each weight would change the loss. If a weight's gradient is high, nudging it will change the loss a lot. The gradient points toward 'make loss worse' — so you move opposite to it.", analogy: "Standing on a hill in fog. The gradient tells you which direction is uphill. You walk downhill." },
  { term: "Gradient descent", cat: "Training Loop", def: "The core training algorithm. After each prediction, compute the gradient and adjust all weights slightly in the direction that reduces loss. Repeat billions of times.", analogy: "Slowly rolling a ball down a bumpy landscape until it settles in a valley (low loss)." },
  { term: "Backpropagation", cat: "Training Loop", def: "The math that computes the gradient efficiently. After a wrong prediction, the blame is propagated backward through every layer to figure out how much each weight contributed to the error.", analogy: "Tracing back through a factory assembly line to find which station introduced the defect." },
  { term: "Learning rate", cat: "Training Loop", def: "How large a step you take when adjusting weights after each gradient update. Too high: the model overshoots and becomes unstable. Too low: training is painfully slow and may get stuck. Usually very small — like 0.0001.", analogy: "How big your steps are when walking down a hill in fog. Too big and you overshoot; too small and you never arrive." },
  { term: "Optimizer", cat: "Training Loop", def: "The algorithm that decides how to apply gradients to update weights. Basic gradient descent is one, but most modern training uses Adam or AdamW, which adaptively adjusts learning rates for each weight.", analogy: "Your GPS navigation — gradient descent says 'go downhill,' the optimizer says 'actually, based on recent history, take this smarter route.'"},
  { term: "Batch size", cat: "Training Loop", def: "Instead of updating weights after each individual example, you collect a batch of examples, average their gradients, then update. Larger batches are more stable but require more memory.", analogy: "Taking an average of 100 student test scores to grade a teaching method, rather than judging after just one test." },
  { term: "Epoch", cat: "Training Loop", def: "One complete pass through the entire training dataset. Models are often trained for multiple epochs, seeing the same data multiple times but in different orders.", analogy: "Reading a textbook cover to cover — one epoch. Reading it three times = three epochs." },
  { term: "Overfitting", cat: "Training Loop", def: "When the model memorizes training data instead of learning general patterns. It gets perfect scores on data it's seen, but fails on anything new. Like a student who memorizes past exams but can't handle new questions.", analogy: "Cramming exact test answers instead of understanding the subject." },
  { term: "Regularization", cat: "Training Loop", def: "Techniques used to prevent overfitting — nudging the model toward simpler solutions that generalize better. Includes methods like dropout and weight decay.", analogy: "Encouraging a student to understand concepts rather than memorize specific answers." },
  { term: "Dropout", cat: "Training Loop", def: "A regularization technique where random weights are temporarily set to zero during training. Forces the model to learn redundant pathways and prevents over-reliance on any one feature.", analogy: "Sports practice where you randomly bench players — forces everyone to be capable, not just rely on the star." },

  { term: "Pretraining", cat: "Training Phases", def: "The first and most expensive phase. The model reads a massive dataset (essentially a compressed internet) and learns to predict the next token. No instructions, no goals — pure pattern learning from raw text. This builds the base model.", analogy: "A child reading everything they can get their hands on for years, absorbing language and world knowledge before any formal schooling." },
  { term: "Fine-tuning", cat: "Training Phases", def: "After pretraining, you train further on a smaller, curated dataset to make the model useful for a specific task or behavior. This is where you turn a raw text predictor into an assistant that follows instructions.", analogy: "A well-read person going through specialized job training." },
  { term: "RLHF", cat: "Training Phases", def: "Reinforcement Learning from Human Feedback. Humans rate the model's outputs, those ratings train a 'reward model' (a judge), and then the original model is trained to generate outputs the judge scores highly. This is how raw pretrained models become helpful, harmless assistants.", analogy: "A chef who cooks dishes, gets customer ratings, trains a food critic to internalize those ratings, then uses that critic to keep improving." },
  { term: "Reward model", cat: "Training Phases", def: "A separate AI model trained on human preference data that scores outputs for quality. Used in RLHF to guide training without needing a human rating every single generation.", analogy: "A trained food critic whose palate represents the average diner's preferences." },
  { term: "Constitutional AI (CAI)", cat: "Training Phases", def: "Anthropic's technique where instead of relying purely on human raters, a set of principles (a 'constitution') guides the model to critique and revise its own outputs. Reduces dependence on human feedback at scale.", analogy: "A student given a code of conduct who grades their own essays against it, rather than waiting for a teacher." },
  { term: "Synthetic data", cat: "Training Phases", def: "Training data generated by AI models rather than written by humans. Increasingly used because high-quality human data is limited. A powerful model generates examples, a weaker model trains on them.", analogy: "Using a master chef's recipe transcriptions to train a culinary school, rather than requiring students to shadow the master personally." },
  { term: "Instruction tuning", cat: "Training Phases", def: "A type of fine-tuning where the model is trained on examples of instructions and ideal responses — teaching it to follow directions rather than just predict text.", analogy: "The difference between a well-read person and a well-read person who's also been trained as a personal assistant." },
  { term: "Base model", cat: "Training Phases", def: "The raw output of pretraining, before any fine-tuning or RLHF. Knows a lot about language and the world, but doesn't necessarily behave helpfully — it just predicts text.", analogy: "A brilliant but unsocialized person with massive knowledge and no training on how to interact with others." },

  { term: "Inference", cat: "Inference", def: "The act of running a trained model to get outputs — i.e. actually using the model. Separate from training. Training is expensive and happens once; inference is cheaper and happens billions of times.", analogy: "Training is learning to play piano. Inference is every performance after that." },
  { term: "Temperature", cat: "Inference", def: "A dial that controls how random the model's outputs are. Temperature 0 = always picks the most likely token (predictable, safe). Temperature 1+ = more random, creative, sometimes incoherent.", analogy: "Temperature 0 is writing with a template. Temperature 2 is freeform stream of consciousness." },
  { term: "Sampling", cat: "Inference", def: "How the model picks the next token. The model generates a probability distribution over all possible next tokens; sampling is the strategy for choosing from that distribution — top-k, top-p (nucleus), greedy, etc.", analogy: "Given a menu, how you decide what to order — pick the best thing (greedy), randomly pick from the top 3 (top-k), or pick from anything you'd realistically consider (top-p)." },
  { term: "Top-k sampling", cat: "Inference", def: "Only consider the top k most likely next tokens, then sample from those. Cuts off extremely unlikely words while keeping some randomness.", analogy: "Only considering your top 5 restaurant choices, then randomly picking from those." },
  { term: "Top-p (nucleus) sampling", cat: "Inference", def: "Instead of a fixed number of tokens, keep however many tokens add up to probability p (e.g. 90%). This adapts — sometimes you get 5 options, sometimes 50 — depending on how spread out the probability is.", analogy: "Keep any options that, together, cover 90% of your realistic choices." },
  { term: "KV cache", cat: "Inference", def: "During a conversation, the model computes attention for every token. The KV cache stores those computations so the model doesn't redo them for every new token — it just reads the cache instead. Critical for efficiency in long conversations.", analogy: "Your browser cache — saves work you already did so you don't repeat it every time you visit the same page." },
  { term: "Latency", cat: "Inference", def: "How long it takes to get a response — the delay from sending a message to seeing the first word. Matters a lot for user experience. Often measured as time-to-first-token.", analogy: "The pause after placing a food order before the first dish arrives." },
  { term: "Throughput", cat: "Inference", def: "How many requests the system can process at the same time, or how many tokens per second it can generate total. Latency and throughput often trade off — optimizing for one can hurt the other.", analogy: "A restaurant's total meals served per hour vs the wait time for any individual table." },
  { term: "Prompt", cat: "Inference", def: "The input you give the model. Everything the model can see when generating a response. Includes the system prompt, conversation history, and user message.", analogy: "The question on a test, along with all the instructions and context provided at the top." },
  { term: "System prompt", cat: "Inference", def: "Hidden instructions provided to the model before the user conversation begins. Sets the model's persona, rules, and context. The user usually doesn't see it.", analogy: "The briefing an employee gets before a client call — shapes behavior without the client seeing it." },
  { term: "Hallucination", cat: "Inference", def: "When a model generates confidently stated but factually wrong information. Happens because the model is predicting plausible text, not retrieving verified facts. A known weakness of all current LLMs.", analogy: "An overconfident student filling in blanks on a test by making up plausible-sounding answers." },

  { term: "GPU", cat: "Hardware & Efficiency", def: "Graphics Processing Unit — the hardware AI runs on. Originally built for video games (rendering thousands of pixels in parallel), GPUs turned out to be perfect for AI's matrix math. Nvidia dominates this market.", analogy: "Instead of one very powerful general-purpose worker (CPU), you get thousands of simple workers doing math simultaneously." },
  { term: "VRAM", cat: "Hardware & Efficiency", def: "Video RAM — the memory inside a GPU. This is where model weights and the KV cache live during inference. It's the most critical bottleneck: if your model doesn't fit in VRAM, it can't run efficiently.", analogy: "A desk — you can only work with what fits on it. A bigger desk = run bigger models." },
  { term: "FLOPs", cat: "Hardware & Efficiency", def: "Floating Point Operations — the measuring stick for how much math a model does. Training a big model might require 10²³ FLOPs. Used to compare training cost and model size across different systems.", analogy: "Counting how many individual math operations it took — like counting the total brush strokes to paint a building." },
  { term: "Memory bandwidth", cat: "Hardware & Efficiency", def: "How fast data can move from storage (VRAM) to the processing cores. Often the real bottleneck — not raw compute. A GPU might be fast, but if it's waiting on data to arrive, it sits idle.", analogy: "A powerful blender but a tiny funnel — the blender can handle the fruit, but you can't pour it in fast enough." },
  { term: "Bytes", cat: "Hardware & Efficiency", def: "Unit of data size. Each parameter has a precision — 32-bit = 4 bytes, 16-bit = 2 bytes. A 70B parameter model in 16-bit takes ~140GB of memory. Understanding bytes helps you understand why models need so much hardware.", analogy: "Knowing the size of your furniture before you move — you need to know if it fits in the truck (GPU)." },
  { term: "Quantization", cat: "Hardware & Efficiency", def: "Reducing the precision of model weights (e.g. from 32-bit to 8-bit or 4-bit numbers) to shrink memory usage and speed up inference — with minimal quality loss. Allows bigger models to run on smaller hardware.", analogy: "Compressing a photo from RAW to JPEG — much smaller file, nearly identical to the eye." },
  { term: "Mixed precision training", cat: "Hardware & Efficiency", def: "Using 16-bit precision for most operations (faster, less memory) but 32-bit for the weight updates where precision matters most. Gets speed benefits without sacrificing training stability.", analogy: "Using a rough pencil sketch for the draft and fine ink only for the final lines." },
  { term: "Tensor", cat: "Hardware & Efficiency", def: "A multi-dimensional array of numbers. A list is 1D, a table is 2D, a cube is 3D — all tensors. Almost all data in AI (inputs, weights, activations) is represented as tensors. 'TensorFlow' is named after them.", analogy: "If a vector is a list and a matrix is a grid, a tensor is any shape of organized numbers — a stack of grids, a cube of grids, etc." },
  { term: "Tensor cores", cat: "Hardware & Efficiency", def: "Specialized hardware units inside Nvidia GPUs designed specifically for the matrix multiplications that dominate AI workloads. Much faster than general-purpose GPU cores for this task.", analogy: "A special attachment on a drill press designed specifically for one type of hole — much faster than doing it generally." },
  { term: "Pipelining", cat: "Hardware & Efficiency", def: "Splitting the model across multiple devices and running different layers on different devices simultaneously, like an assembly line. While device 1 processes layer 1 for batch A, device 2 processes layer 2 for batch A and layer 1 for batch B.", analogy: "A car assembly line — different stations work on different cars at the same time." },
  { term: "Expert parallelism", cat: "Hardware & Efficiency", def: "In Mixture of Experts models, different 'expert' subnetworks are spread across different devices. Inputs are routed to the right device for their expert. Allows very large models to run efficiently.", analogy: "A hospital where different specialist departments are in different wings — patients are routed to the right department rather than everyone crowding the same room." },
  { term: "Amortized cost", cat: "Hardware & Efficiency", def: "Spreading the upfront training cost across all uses of the model. Training GPT-4 might cost $100M, but if a billion people use it, the per-query cost is fractions of a cent. The cost is amortized.", analogy: "A printing press costs a lot to build, but the cost per page drops to almost nothing once you're printing millions of books." },

  { term: "Scaling laws", cat: "Scale & Research", def: "Discovered relationships showing that model performance improves predictably as you increase model size, dataset size, and compute — each roughly following a power law. This empirical finding drove the 'just make it bigger' era of AI.", analogy: "Like discovering that adding workers to a factory always increases output in a predictable ratio — it made investment decisions easy to justify." },
  { term: "Emergent capabilities", cat: "Scale & Research", def: "Abilities that appear suddenly at a certain scale without being explicitly trained. A model might gain multi-step reasoning or translation ability abruptly once it crosses a threshold of size/data.", analogy: "Water doesn't get 'a little bit frozen' — it crosses a threshold and the whole thing changes phase." },
  { term: "Benchmark", cat: "Scale & Research", def: "A standardized test used to compare model performance. MMLU tests knowledge breadth, HumanEval tests coding, GSM8K tests math. Models are ranked against each other on these. Results can be gamed, so they're useful but imperfect.", analogy: "Standardized tests — useful for comparing students at scale but doesn't capture everything about a person's intelligence." },
  { term: "Perplexity", cat: "Scale & Research", def: "A measure of how 'surprised' a model is by a text sample. Low perplexity = the model predicted the text well = it has a good model of that kind of language. Used to compare language model quality.", analogy: "How often you'd guess correctly while reading someone's sentence word by word. Predictable writing = low perplexity." },
  { term: "Bits per byte / BPB", cat: "Scale & Research", def: "A compression-based measure of model quality. How many bits does the model need to encode each byte of text? Better models need fewer bits because they're better at predicting. Connects AI and information theory.", analogy: "How efficiently you summarize a book — a deep understanding means you need fewer notes to reconstruct it." },
  { term: "Pre-training compute (C)", cat: "Scale & Research", def: "The total FLOPs used to train a model. Roughly C = 6 × N × D, where N = parameters and D = tokens trained on. This is the central quantity in scaling laws.", analogy: "Total student-hours of study — a function of how many students and how long they studied." },
  { term: "Chinchilla scaling", cat: "Scale & Research", def: "A 2022 paper from DeepMind showing models were being undertrained — the optimal ratio is ~20 tokens of training data per parameter. Changed how the whole field calibrated training runs.", analogy: "Discovering that you'd been building huge engines but only putting in half the fuel — you needed both to scale together." },

  { term: "Mixture of Experts (MoE)", cat: "Advanced Architectures", def: "An architecture where the model has many 'expert' subnetworks, but only 2-4 of them activate for any given input. Total parameters are huge, but compute per token is small. GPT-4 and Mixtral use this.", analogy: "A law firm with 100 specialists — for any case, you only bring in 3-4 relevant experts rather than the whole firm." },
  { term: "Sparse model", cat: "Advanced Architectures", def: "A model where most weights are zero or inactive at any given time. MoE models are sparse — only a fraction of experts activate per token. Opposite of dense models where all weights are always used.", analogy: "A library where only a few shelves are visited for any given research topic, rather than reading every book." },
  { term: "Retrieval-Augmented Generation (RAG)", cat: "Advanced Architectures", def: "Instead of relying purely on weights for knowledge, the model first searches an external database for relevant documents, then uses those to generate a response. Reduces hallucination for knowledge-intensive tasks.", analogy: "An open-book exam — you don't memorize everything, you look it up and then reason about it." },
  { term: "Long context", cat: "Advanced Architectures", def: "The challenge and technology around extending how much text a model can process at once. Attention scales quadratically with sequence length — 2x context = 4x compute — making long context very expensive.", analogy: "Like trying to hold an entire city map in your head vs a city block — the cognitive load scales faster than the size." },
  { term: "Multimodal", cat: "Advanced Architectures", def: "Models that handle more than just text — images, audio, video, code. GPT-4V, Gemini, Claude 3+ are multimodal. Different modalities are typically encoded into a shared token/embedding space.", analogy: "A translator who works not just between languages, but between languages and sign language, braille, and Morse code." },
  { term: "Agent / Agentic AI", cat: "Advanced Architectures", def: "An AI that doesn't just respond to single queries but takes sequences of actions over time — browsing the web, writing and running code, calling APIs — to complete longer-horizon tasks.", analogy: "The difference between an advisor who answers questions and an employee who executes a multi-step project." },
  { term: "Tool use / Function calling", cat: "Advanced Architectures", def: "The ability for a model to call external tools (search engines, calculators, databases, APIs) mid-generation. The model decides when to call a tool, formats the call, gets the result, then continues generating.", analogy: "A consultant who knows when to bring in a specialist, makes the call, gets the report, then incorporates it into their work." },
  { term: "Chain of thought (CoT)", cat: "Advanced Architectures", def: "A prompting technique where the model is encouraged to reason step-by-step before giving a final answer. Dramatically improves performance on complex reasoning tasks. 'Think step by step' is a basic version.", analogy: "Showing your work on a math test — the process itself catches errors and reaches better answers." },
  { term: "Reinforcement learning (RL)", cat: "Advanced Architectures", def: "A learning paradigm where a model takes actions, receives a reward signal, and learns to maximize reward over time. Used in RLHF and increasingly in training models to reason (DeepSeek-R1, o1).", analogy: "Training a dog — action → consequence → reinforcement. The dog learns which behaviors lead to treats." },
];

const catKeys = Object.keys(CATS);
let activeFilter = "All";
let openCard = null;

function getFiltered(filter, query) {
  let items = TERMS;
  if (filter !== "All") items = items.filter(t => t.cat === filter);
  if (query) {
    const q = query.toLowerCase();
    items = items.filter(t => t.term.toLowerCase().includes(q) || t.def.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q));
  }
  return items;
}

function groupBy(items) {
  const groups = {};
  items.forEach(item => {
    if (!groups[item.cat]) groups[item.cat] = [];
    groups[item.cat].push(item);
  });
  return groups;
}

function render() {
  const query = document.getElementById("search").value.trim();
  const filtered = getFiltered(activeFilter, query);
  const grouped = groupBy(filtered);
  const list = document.getElementById("list");
  const count = document.getElementById("count");
  count.textContent = `${filtered.length} term${filtered.length !== 1 ? "s" : ""}`;
  list.innerHTML = "";

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty"><i class="ti ti-mood-empty" aria-hidden="true" style="font-size:24px;display:block;margin-bottom:8px;"></i>No terms found</div>';
    return;
  }

  const showGroups = activeFilter === "All" && !query;
  const order = showGroups ? catKeys : Object.keys(grouped);

  order.forEach(cat => {
    const items = grouped[cat];
    if (!items) return;
    const style = CATS[cat];
    if (showGroups || Object.keys(grouped).length > 1) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = cat;
      list.appendChild(label);
    }
    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<div class="card-head">
        <div class="dot" style="background:${style.dot}"></div>
        <span class="term">${item.term}</span>
        <span class="tag" style="background:${style.bg};color:${style.tag_color}">${item.cat}</span>
        <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
      </div>
      <div class="def">${item.def}${item.analogy ? `<div class="analogy"><i class="ti ti-bulb" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>${item.analogy}</div>` : ""}</div>`;
      card.addEventListener("click", () => {
        if (openCard && openCard !== card) openCard.classList.remove("open");
        card.classList.toggle("open");
        openCard = card.classList.contains("open") ? card : null;
      });
      list.appendChild(card);
    });
  });
}

function buildFilters() {
  const wrap = document.getElementById("filters");
  const allPill = document.createElement("button");
  allPill.className = "pill active";
  allPill.textContent = "All";
  allPill.addEventListener("click", () => setFilter("All", allPill));
  wrap.appendChild(allPill);
  catKeys.forEach(cat => {
    const pill = document.createElement("button");
    pill.className = "pill";
    pill.textContent = cat;
    pill.addEventListener("click", () => setFilter(cat, pill));
    wrap.appendChild(pill);
  });
}

function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  openCard = null;
  render();
}

document.getElementById("search").addEventListener("input", render);
buildFilters();
render();
</script>
